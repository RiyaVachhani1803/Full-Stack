<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day-12</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <h1>Bootstrap Demo</h1>
    <h2><u>Buttons</u></h2>
    <!--button using bootstrap-->
    <button class="btn">click here</button>
    <br><br>
    <button class="btn btn-warning">Warning</button>
    <br><br>
    <button class="btn btn-danger">Danger</button>
    <br><br>
    <button class="btn btn-success">Success</button>
    <br><br>
    <button class="btn btn-light">Light</button>
    <br><br>
    <button class="btn btn-dark">Dark</button>
    <br><br>
    <button class="btn btn-lg btn-primary">Large button</button>
    <br><br>
    <button class="btn btn-sm btn-primary">Small button</button>
    <br><br>
    <button class="btn btn-info" disabled>Info</button>
    <br><br>
    <a href="#" class="btn btn-outline-dark">Google Me!</a>
    <br><br>
    <!--button group-->
    <div class="btn-group">
        <button class="btn btn-danger">Left</button>
        <button class="btn btn-warning">Middle</button>
        <button class="btn btn-success">Right</button>
    </div>
    <hr>

    <h2><u>Badges</u></h2><br>
    <h3>Notifications <span class="badge bg-success">New</span></h3>
    <br>
    <button class="btn btn-primary">
        Followers 
        <span class="badge bg-secondary">100+</span>
    </button>
    <br><br>
    <button class="btn btn-primary position-relative">
        Request
        <span class="position-absolute top-8 start-100 translate-middle badge bg-danger rounded-pill bg">99+</span>
        <span class="visually-hidden"></span>
    </button>
    <br>
    <br>

    <h2><u>Alerts</u></h2>
    <div class="alert alert-danger">Download Failed! Please try again.</div>
    <br>
    <div class="alert alert-success">Congratulations! Your score is 100 out of 100.</div>
    <br>
    <div class="alert alert-warning alert-dismissible">Error!!Close this page.
        <button class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <br>
    <br>

    <h2><u>Navbar</u></h2>
    <nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="light">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">My Player</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                <div class="navbar-nav">
                    <a class="nav-link active" aria-current="page" href="#">Home</a>
                    <a class="nav-link" href="#">Features</a>
                    <a class="nav-link" href="#">Notifications</a>
                    <a class="nav-link disabled" aria-disabled="true">About Us</a>
                </div>
            </div>
            <form class="d-flex" role="search">
                <input class="form-control" type="search" placeholder="search" aria-label="search">
                <button class="btn btn-dark" type="submit">search</button>
            </form>
        </div>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
